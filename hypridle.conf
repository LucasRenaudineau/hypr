general {
		lock_cmd = hyprlock
}
listener {
		timeout = 600
		on-timeout = notify-send "The screen is about to turn off !!!!!!"
}

listener {
		timeout = 620
		on-timeout = loginctl lock-session
}

# Checks of updates
listener {
    timeout = 21600
    on-timeout = ~/.config/hypr/scripts/update-check.sh
}
# Battery check every 5 minutes (300 seconds)
listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/battery-check.sh
}
